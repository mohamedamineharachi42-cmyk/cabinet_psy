<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prendre rendez-vous - Cabinet de Psychothérapie</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 40px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .content {
            padding: 40px;
        }
        
        .step {
            margin-bottom: 30px;
        }
        
        .step h3 {
            color: #667eea;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .calendar-input {
            width: 100%;
            padding: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
        }
        
        .slots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }
        
        .time-slot {
            padding: 12px;
            text-align: center;
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .time-slot:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }
        
        .time-slot.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #2d3748;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
        }
        
        .radio-group {
            display: flex;
            gap: 20px;
        }
        
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: normal;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        
        .message.success {
            background: #c6f6d5;
            color: #22543d;
            display: block;
        }
        
        .message.error {
            background: #fed7d7;
            color: #9b2c2c;
            display: block;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .info-box {
            background: #f7fafc;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }
        
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }
            .row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 Prendre rendez-vous</h1>
            <p>Choisissez votre créneau en quelques clics</p>
        </div>
        
        <div class="content">
            <div id="message" class="message"></div>
            
            <!-- Étape 1: Date -->
            <div class="step">
                <h3>1. Choisissez une date</h3>
                <input type="text" id="datePicker" class="calendar-input" placeholder="Sélectionnez une date">
            </div>
            
            <!-- Étape 2: Créneaux -->
            <div class="step" id="slotsStep" style="display: none;">
                <h3>2. Choisissez un horaire</h3>
                <div id="slotsGrid" class="slots-grid"></div>
            </div>
            
            <!-- Étape 3: Formulaire -->
            <div class="step" id="formStep" style="display: none;">
                <h3>3. Vos informations</h3>
                
                <div class="info-box" id="selectedInfo"></div>
                
                <form id="appointmentForm">
                    <div class="row">
                        <div class="form-group">
                            <label>Prénom *</label>
                            <input type="text" id="prenom" required>
                        </div>
                        <div class="form-group">
                            <label>Nom *</label>
                            <input type="text" id="nom" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Téléphone</label>
                        <input type="tel" id="telephone">
                    </div>
                    
                    <div class="form-group">
                        <label>Type de consultation</label>
                        <div class="radio-group">
                            <label>
                                <input type="radio" name="type" value="presentiel" checked>
                                Présentiel
                            </label>
                            <label>
                                <input type="radio" name="type" value="visio">
                                Visioconférence
                            </label>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Message (optionnel)</label>
                        <textarea id="messageText" rows="3" placeholder="Décrivez brièvement votre demande..."></textarea>
                    </div>
                    
                    <button type="submit" class="btn" id="submitBtn">
                        Confirmer le rendez-vous (60€)
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/fr.js"></script>
    
    <script>
        const API_URL = 'http://localhost:5000/api';
        
        let selectedDate = null;
        let selectedTime = null;
        
        // Initialisation du calendrier
        flatpickr("#datePicker", {
            locale: "fr",
            minDate: "today",
            dateFormat: "Y-m-d",
            onChange: function(selectedDates, dateStr) {
                selectedDate = dateStr;
                loadAvailableSlots(dateStr);
            }
        });
        
        // Charger les créneaux disponibles
        async function loadAvailableSlots(date) {
            const slotsStep = document.getElementById('slotsStep');
            const slotsGrid = document.getElementById('slotsGrid');
            const formStep = document.getElementById('formStep');
            
            // Cacher le formulaire
            formStep.style.display = 'none';
            
            // Afficher le chargement
            slotsStep.style.display = 'block';
            slotsGrid.innerHTML = '<div style="text-align:center; padding:20px;">⏳ Chargement des créneaux...</div>';
            
            try {
                const response = await fetch(`${API_URL}/available-slots?date=${date}`);
                const data = await response.json();
                
                if (data.success) {
                    if (data.slots.length === 0) {
                        slotsGrid.innerHTML = '<div style="text-align:center; padding:20px; color:#f56565;">❌ Aucun créneau disponible pour cette date</div>';
                    } else {
                        slotsGrid.innerHTML = data.slots.map(slot => `
                            <div class="time-slot" data-time="${slot}">
                                ${slot}
                            </div>
                        `).join('');
                        
                        // Ajouter les événements de clic
                        document.querySelectorAll('.time-slot').forEach(slot => {
                            slot.addEventListener('click', function() {
                                // Retirer la sélection précédente
                                document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
                                // Sélectionner ce créneau
                                this.classList.add('selected');
                                selectedTime = this.dataset.time;
                                
                                // Afficher le formulaire
                                const dateFormatted = new Date(selectedDate).toLocaleDateString('fr-FR');
                                document.getElementById('selectedInfo').innerHTML = `
                                    <strong>Rendez-vous sélectionné :</strong><br>
                                    📅 ${dateFormatted} à ${selectedTime}<br>
                                    💰 Tarif: 60€
                                `;
                                document.getElementById('formStep').style.display = 'block';
                            });
                        });
                    }
                } else {
                    slotsGrid.innerHTML = `<div style="text-align:center; padding:20px; color:#f56565;">❌ Erreur: ${data.error || 'Erreur de chargement'}</div>`;
                }
            } catch (error) {
                console.error('Erreur:', error);
                slotsGrid.innerHTML = `<div style="text-align:center; padding:20px; color:#f56565;">❌ Erreur de connexion au serveur</div>`;
            }
        }
        
        // Soumission du formulaire
        document.getElementById('appointmentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = 'Confirmation en cours... <span class="loading"></span>';
            submitBtn.disabled = true;
            
            const formData = {
                prenom: document.getElementById('prenom').value,
                nom: document.getElementById('nom').value,
                email: document.getElementById('email').value,
                telephone: document.getElementById('telephone').value,
                date: selectedDate,
                time: selectedTime,
                type_consultation: document.querySelector('input[name="type"]:checked').value,
                notes: document.getElementById('messageText').value
            };
            
            try {
                const response = await fetch(`${API_URL}/appointments`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    const messageDiv = document.getElementById('message');
                    messageDiv.className = 'message success';
                    messageDiv.innerHTML = '✅ Rendez-vous confirmé ! Redirection vers la page de paiement...';
                    messageDiv.style.display = 'block';
                    
                    // Rediriger vers la page de paiement après 2 secondes
                    setTimeout(() => {
                        window.location.href = `/payment.html?id=${result.appointment_id}`;
                    }, 2000);
                } else {
                    throw new Error(result.error || 'Erreur inconnue');
                }
            } catch (error) {
                const messageDiv = document.getElementById('message');
                messageDiv.className = 'message error';
                messageDiv.innerHTML = '❌ Erreur: ' + error.message;
                messageDiv.style.display = 'block';
                
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            }
        });
    </script>
</body>
</html>
